<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NEON RUNNER — A cyberpunk 2D platformer game set in Neo-City 2087">
  <title>NEON RUNNER — Cyberpunk Platformer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/index.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="loading-screen">
      <div class="loader-content">
        <h1 class="game-title">NEON<span class="highlight">RUNNER</span></h1>
        <div class="loader-bar">
          <div class="loader-fill" id="loader-fill"></div>
        </div>
        <p class="loader-text" id="loader-text">Initializing systems...</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
